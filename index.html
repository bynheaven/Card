<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card component</title>
    <link rel="stylesheet" href="card.css">
</head>

<body>
    <div class="card-grid">
        <div class="card">
            <img class="card__image" src="https://i.imgur.com/HRydLi4.jpeg" alt="Jotaro Kujo" />
            <div class="card__body">
                <h2 class="card__title">Jotaro Kujo</h2>
                <p class="card__text">
                    A delinquent with a heart of gold and the most powerful stand in part.3. Ora ora ora!
                </p>
                <a href="#" class="card__btn">Read more</a>
            </div>
        </div>
        <div class="card">
            <img class="card__image" src="https://i.imgur.com/HRydLi4.jpeg" alt="Kars" />
            <div class="card__body">
                <h2 class="card__title">Kars</h2>
                <p class="card__text">
                    He became the ultimate life form in part.2.
                </p>
                <a href="#" class="card__btn">Read more</a>
            </div>
        </div>
        <div class="card">
            <img class="card__image" src="https://i.imgur.com/HRydLi4.jpeg" alt="Rohan Kishibe" />
            <div class="card__body">
                <h2 class="card__title">Rohan Kishibe</h2>
                <p class="card__text">
                    A famous mangaka from Morioh in part.4. His stand is Heaven's door.
                </p>
                <a href="#" class="card__btn">Read more</a>
            </div>
        </div>
    </div>
</body>

</html>
